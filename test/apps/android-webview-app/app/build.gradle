plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.webviewtest'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.webviewtest'
        minSdk 29
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {}
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
