<template>
  <nav style="display: flex; gap: 1.25rem; margin-bottom: 1rem" aria-label="Experience Cloud pages">
    <a style="color: #06c; text-decoration: underline" href="{homeHref}">Home</a>
    <a style="color: #06c; text-decoration: underline" href="{productExplorerHref}" aria-current="page"
      >Product Explorer</a
    >
  </nav>

  <h1 data-testid="salesforce-product-explorer">Product Explorer</h1>

  <div style="display: flex; gap: 2rem; align-items: flex-start">
    <aside style="flex: 0 0 200px">
      <div style="margin-bottom: 1rem">
        <label style="display: block" for="search-key">Search Key</label>
        <input
          id="search-key"
          type="text"
          placeholder="Search products"
          value="{searchKey}"
          onchange={handleSearchKeyChange}
        />
      </div>

      <div style="margin-bottom: 1rem">
        <label style="display: block" for="max-price">Max Price</label>
        <input
          id="max-price"
          type="range"
          min="0"
          max="10000"
          step="100"
          value="{maxPrice}"
          onchange={handleMaxPriceChange}
        />
        <p>{formattedMaxPrice}</p>
      </div>

      <div style="margin-bottom: 1rem">
        <p>Material</p>
        <template for:each="{materialOptions}" for:item="option">
          <label style="display: block" key="{option.value}">
            <input
              type="checkbox"
              data-group="material"
              data-value="{option.value}"
              checked="{option.checked}"
              onchange={handleFilterToggle}
            />
            {option.value}
          </label>
        </template>
      </div>

      <div>
        <p>Level</p>
        <template for:each="{levelOptions}" for:item="option">
          <label style="display: block" key="{option.value}">
            <input
              type="checkbox"
              data-group="level"
              data-value="{option.value}"
              checked="{option.checked}"
              onchange={handleFilterToggle}
            />
            {option.value}
          </label>
        </template>
      </div>
    </aside>

    <div style="flex: 1 1 auto; display: flex; flex-wrap: wrap; gap: 1rem">
      <template for:each="{filteredProducts}" for:item="product">
        <div style="border: 1px solid #ccc; padding: 1rem; width: 200px" key="{product.id}">
          <h2>{product.name}</h2>
          <p>{product.category}</p>
          <p>{product.formattedPrice}</p>
          <button
            data-product-id="{product.id}"
            onclick={handleViewDetailsClick}
          >
            View Details
          </button>
        </div>
      </template>
      <template lwc:if="{noResults}">
        <p>No products match the selected filters.</p>
      </template>
    </div>
  </div>
</template>
