<template>
  <section data-testid="product-explorer">
    <div aria-label="Products">
      <template for:each="{productsForView}" for:item="product">
        <button
          key="{product.id}"
          data-id="{product.id}"
          type="button"
          onclick="{handleSelectProduct}"
          style="display: block; margin-bottom: 0.75rem; text-align: left"
        >
          <span>{product.name}</span>
          <span>{product.level} / {product.material}</span>
          <span>
            <lightning-formatted-number
              format-style="currency"
              currency-code="USD"
              value="{product.msrp}"
              maximum-fraction-digits="0"
            ></lightning-formatted-number>
          </span>
        </button>
      </template>
    </div>

    <div>
      <header>
        <div>
          <h2>{selectedProduct.name}</h2>
          <p>{selectedProduct.category} / {selectedProduct.level}</p>
        </div>
        <lightning-button
          label="Reset"
          variant="neutral"
          onclick="{handleReset}"
        ></lightning-button>
      </header>

      <div>
        <lightning-input
          label="Product Name"
          data-field="name"
          value="{selectedProduct.name}"
          onchange="{handleFieldChange}"
        ></lightning-input>
        <lightning-input
          label="MSRP"
          type="number"
          data-field="msrp"
          value="{selectedProduct.msrp}"
          formatter="currency"
          step="100"
          onchange="{handleFieldChange}"
        ></lightning-input>
        <lightning-combobox
          label="Category"
          data-field="category"
          value="{selectedProduct.category}"
          options="{categoryOptions}"
          onchange="{handleFieldChange}"
        ></lightning-combobox>
        <lightning-combobox
          label="Level"
          data-field="level"
          value="{selectedProduct.level}"
          options="{levelOptions}"
          onchange="{handleFieldChange}"
        ></lightning-combobox>
        <lightning-combobox
          label="Material"
          data-field="material"
          value="{selectedProduct.material}"
          options="{materialOptions}"
          onchange="{handleFieldChange}"
        ></lightning-combobox>
        <lightning-input
          label="Motor"
          data-field="motor"
          value="{selectedProduct.motor}"
          onchange="{handleFieldChange}"
        ></lightning-input>
        <lightning-input
          label="Battery"
          data-field="battery"
          value="{selectedProduct.battery}"
          onchange="{handleFieldChange}"
        ></lightning-input>
        <lightning-input
          label="Brakes"
          data-field="brakes"
          value="{selectedProduct.brakes}"
          onchange="{handleFieldChange}"
        ></lightning-input>
      </div>

      <lightning-textarea
        label="Description"
        data-field="description"
        value="{selectedProduct.description}"
        onchange="{handleFieldChange}"
      ></lightning-textarea>
    </div>
  </section>
</template>
